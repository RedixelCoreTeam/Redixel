name: Rust CI

on:
  pull_request:
    branches: ['main', 'develop', 'dev-*']

env:
  CARGO_TERM_COLOR: always

jobs:
  check-format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust
        run: rustup show

      - name: Run rustfmt
        run: cargo fmt -- --check

  check-linux:
    name: Linux
    needs: check-format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust
        run: rustup show

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        run: cargo clippy -- -D warnings

      - name: Run Tests
        run: cargo test --verbose

  check-windows:
    name: Windows
    needs: check-format
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust
        run: rustup show

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        run: cargo clippy -- -D warnings

      - name: Run Tests
        run: cargo test --verbose

  check-wasm:
    name: WASM
    needs: check-format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust
        run: rustup show

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        run: cargo clippy --target wasm32-unknown-unknown -- -D warnings

      - name: Verify WASM Compilation
        run: cargo check --target wasm32-unknown-unknown --verbose

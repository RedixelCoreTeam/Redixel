name: Rust CI

on:
  pull_request:
    branches: ['main', 'develop', 'dev-*']

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Code Quality
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Bootstrap Toolchain
        run: rustup show

      - name: Check Formatting
        run: cargo fmt -- --check

      - name: Run Clippy
        run: cargo clippy --no-deps -- -D warnings

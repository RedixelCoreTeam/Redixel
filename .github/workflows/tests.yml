name: Rust CI

on:
  pull_request:
    branches: ['main', 'develop', 'dev-*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check-format:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust
        run: rustup show

      - name: Run rustfmt
        run: cargo fmt -- --check

  test-suite:
    name: Test Suite (${{ matrix.os }})
    needs: check-format
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Linux Graphics Deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev libxkbcommon-x11-0 xvfb mesa-vulkan-drivers

      - name: Setup Rust
        run: rustup show

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        run: cargo clippy -- -D warnings

      - name: Run Tests (Linux)
        if: runner.os == 'Linux'
        run: |
          export WGPU_BACKEND=vulkan
          xvfb-run --auto-servernum cargo test --workspace --verbose

      - name: Build Executables (Linux)
        if: runner.os == 'Linux'
        run: cargo build --workspace --verbose

      - name: Run Tests (Windows)
        if: runner.os == 'Windows'
        run: cargo test --workspace --verbose

      - name: Build Executables (Windows)
        if: runner.os == 'Windows'
        run: cargo build --workspace --verbose

  check-wasm:
    name: WASM Check
    needs: check-format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust
        run: rustup show

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        run: cargo clippy --target wasm32-unknown-unknown -- -D warnings

      - name: Verify WASM Compilation (Build WASM)
        run: cargo build --workspace --target wasm32-unknown-unknown --verbose

  check-android:
    name: Android Check
    needs: check-format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust
        run: |
          rustup target add aarch64-linux-android
          rustup show

      - name: Install cargo-apk
        run: cargo install cargo-apk

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        run: cargo clippy --target aarch64-linux-android -- -D warnings

      - name: Verify Android Compilation (Build APKs)
        run: |
          cargo apk build -p pong --lib --verbose
          cargo apk build -p shooter --lib --verbose
          cargo apk build -p triangle --lib --verbose
          cargo apk build -p triangle_3d --lib --verbose

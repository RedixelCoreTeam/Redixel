<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RedPixel Engine</title>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <canvas id="redpixel-canvas"></canvas>

    <script type="module">
      import init from './pkg/red_pixel.js';

      async function start() {
        try {
          await init();
        } catch (error) {
          console.error('Engine crashed:', error);
        }
      }

      start();
    </script>
  </body>
</html>
